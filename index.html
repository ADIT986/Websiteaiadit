<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nexus Ai </title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #000;
  --s1: #080808;
  --s2: #111;
  --s3: #1a1a1a;
  --b1: rgba(255,255,255,0.05);
  --b2: rgba(255,255,255,0.1);
  --b3: rgba(255,255,255,0.18);
  --t1: #fff;
  --t2: #bbb;
  --t3: #666;
  --t4: #333;
  --font: 'Outfit', sans-serif;
  --mono: 'DM Mono', monospace;
  --sw: 268px;
}

html, body {
  height: 100%; width: 100%;
  font-family: var(--font);
  background: #000;
  color: var(--t2);
  overflow: hidden;
}

/* ===== LAYER STACK ===== */
#c1, #c2 { position: fixed; inset: 0; pointer-events: none; }
#c1 { z-index: 1; }
#c2 { z-index: 2; }

.vignette {
  position: fixed; inset: 0; z-index: 3;
  pointer-events: none;
  background: radial-gradient(ellipse at center,
    transparent 40%,
    rgba(0,0,0,0.55) 80%,
    rgba(0,0,0,0.85) 100%);
}

/* HUD corners */
.hud {
  position: fixed; z-index: 4;
  pointer-events: none;
  width: 28px; height: 28px;
  opacity: 0.35;
  transition: opacity 1s;
}
.hud-tl { top: 14px; left: 14px; border-top: 1px solid #fff; border-left: 1px solid #fff; }
.hud-tr { top: 14px; right: 14px; border-top: 1px solid #fff; border-right: 1px solid #fff; }
.hud-bl { bottom: 14px; left: 14px; border-bottom: 1px solid #fff; border-left: 1px solid #fff; }
.hud-br { bottom: 14px; right: 14px; border-bottom: 1px solid #fff; border-right: 1px solid #fff; }

/* ===== APP ===== */
.app {
  position: relative; z-index: 10;
  display: flex;
  height: 100dvh; width: 100%;
  overflow: hidden;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sw);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: rgba(4,4,4,0.88);
  backdrop-filter: blur(28px) saturate(120%);
  -webkit-backdrop-filter: blur(28px);
  border-right: 1px solid var(--b1);
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
  will-change: transform;
  z-index: 50;
}

.sb-top {
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--b1);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.logo {
  display: flex; align-items: center; gap: 10px;
  animation: slideR 0.7s cubic-bezier(0.22,1,0.36,1) both;
}

.logo-mark {
  width: 32px; height: 32px;
  position: relative;
  border-radius: 9px;
  background: linear-gradient(145deg, #1e1e1e, #0a0a0a);
  border: 1px solid var(--b2);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.logo-mark::after {
  content: '';
  position: absolute; inset: 0;
  background: conic-gradient(from 0deg at 50% 50%,
    transparent 0deg,
    rgba(255,255,255,0.12) 60deg,
    transparent 120deg);
  animation: logoSpin 4s linear infinite;
}
@keyframes logoSpin {
  to { transform: rotate(360deg); }
}
.logo-mark svg { position: relative; z-index: 1; color: #ddd; }

.logo-name {
  font-size: 0.88rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--t1);
  text-transform: uppercase;
}

.ib {
  background: transparent;
  border: 1px solid var(--b1);
  border-radius: 9px;
  color: var(--t3);
  cursor: pointer;
  padding: 7px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.ib:hover { border-color: var(--b3); color: var(--t1); background: var(--b1); transform: scale(1.06); }
.ib:active { transform: scale(0.95); }

.sb-body {
  flex: 1;
  overflow-y: auto; overflow-x: hidden;
  padding: 12px 8px;
  scrollbar-width: thin;
  scrollbar-color: #1e1e1e transparent;
}
.sb-body::-webkit-scrollbar { width: 2px; }
.sb-body::-webkit-scrollbar-thumb { background: #222; }

.hlabel {
  font-size: 0.58rem;
  font-weight: 600;
  color: var(--t4);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 0 8px 10px;
}

.hi {
  padding: 8px 10px;
  border-radius: 9px;
  font-size: 0.76rem;
  color: var(--t3);
  cursor: pointer;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: all 0.18s;
  border-left: 2px solid transparent;
  margin-bottom: 1px;
  animation: fadeL 0.3s backwards;
}
.hi:hover { background: var(--s2); color: var(--t2); border-left-color: var(--b2); transform: translateX(2px); }
.hi.active { background: rgba(255,255,255,0.06); color: var(--t1); border-left-color: #aaa; }

.sb-bot {
  padding: 12px;
  border-top: 1px solid var(--b1);
}

.mchip {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 12px;
  border-radius: 11px;
  background: rgba(10,10,10,0.7);
  border: 1px solid var(--b1);
  font-size: 0.7rem; color: var(--t3);
  cursor: pointer;
  transition: all 0.2s;
}
.mchip:hover { background: var(--s2); color: var(--t2); border-color: var(--b2); }

.sdot {
  width: 6px; height: 6px;
  background: #fff; border-radius: 50%; flex-shrink: 0;
  animation: sdotPulse 2.2s ease infinite;
}
@keyframes sdotPulse {
  0%,100% { opacity: 0.25; transform: scale(0.7); }
  50% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 5px #fff; }
}

/* ===== MAIN ===== */
.main {
  flex: 1;
  display: flex; flex-direction: column;
  overflow: hidden; min-width: 0;
}

.mob-hdr {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 13px 14px;
  border-bottom: 1px solid var(--b1);
  background: rgba(0,0,0,0.82);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
  animation: slideD 0.5s cubic-bezier(0.22,1,0.36,1) both;
}
.mob-logo {
  flex: 1;
  font-size: 0.85rem; font-weight: 700; letter-spacing: 0.12em;
  color: var(--t1); text-transform: uppercase;
}
.mob-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.58rem; color: var(--t4); letter-spacing: 0.1em;
  font-family: var(--mono);
}

/* ===== WELCOME ===== */
.welcome {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px 20px;
  gap: 40px;
  overflow-y: auto;
  animation: wIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes wIn {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}

.w-hero { text-align: center; }

.w-eye {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--t4);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 16px;
  animation: fIn 0.6s 0.2s both;
  display: flex; align-items: center; gap: 8px; justify-content: center;
}
.w-eye::before, .w-eye::after {
  content: '';
  width: 24px; height: 1px;
  background: var(--t4);
  display: block;
}

.w-title {
  font-size: clamp(2rem, 7vw, 4.2rem);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1.05;
  color: var(--t1);
  animation: titleIn 0.9s 0.1s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes titleIn {
  from { opacity: 0; transform: translateY(24px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.w-title .hl {
  position: relative;
  display: inline-block;
  background: linear-gradient(135deg, #fff 0%, #999 60%, #555 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.w-title .hl::after {
  content: '';
  position: absolute; bottom: -3px; left: 0;
  height: 1px;
  background: linear-gradient(90deg, #fff, transparent);
  animation: underIn 1.2s 0.7s ease forwards;
  width: 0;
}
@keyframes underIn { to { width: 100%; } }

.w-sub {
  font-size: clamp(0.78rem, 2vw, 0.88rem);
  color: var(--t3);
  margin-top: 14px;
  font-weight: 300;
  letter-spacing: 0.03em;
  animation: fIn 0.6s 0.45s both;
}

/* ===== CHIPS ===== */
.chips {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  width: 100%;
  max-width: 620px;
  animation: cIn 0.7s 0.35s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

.chip {
  padding: 13px 14px;
  border: 1px solid var(--b1);
  border-radius: 11px;
  font-size: 0.74rem;
  font-weight: 500;
  color: var(--t3);
  cursor: pointer;
  transition: all 0.28s cubic-bezier(0.22,1,0.36,1);
  background: rgba(8,8,8,0.85);
  backdrop-filter: blur(6px);
  text-align: left;
  line-height: 1.4;
  position: relative;
  overflow: hidden;
}
.chip::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  transition: left 0.5s;
}
.chip:hover::before { left: 140%; }
.chip:hover {
  border-color: var(--b3);
  color: var(--t2);
  transform: translateY(-3px);
  box-shadow: 0 14px 35px rgba(0,0,0,0.7);
  background: rgba(14,14,14,0.95);
}
.chip:active { transform: translateY(-1px); }

/* ===== CHAT ===== */
.chat {
  flex: 1;
  overflow-y: auto; overflow-x: hidden;
  padding: 16px 0 6px;
  display: none;
  flex-direction: column;
  scrollbar-width: thin;
  scrollbar-color: #1e1e1e transparent;
}
.chat::-webkit-scrollbar { width: 2px; }
.chat::-webkit-scrollbar-thumb { background: #222; }

.msg { animation: msgIn 0.38s cubic-bezier(0.22,1,0.36,1) both; }
@keyframes msgIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.mi {
  max-width: min(760px, calc(100% - 28px));
  margin: 0 auto;
}

.msg.user { padding: 5px 0; }
.msg.user .mi { display: flex; justify-content: flex-end; }
.ubub {
  background: rgba(18,18,18,0.95);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 18px 18px 5px 18px;
  padding: 10px 15px;
  font-size: 0.86rem;
  line-height: 1.6;
  color: var(--t2);
  max-width: min(74%, 520px);
  white-space: pre-wrap;
  word-break: break-word;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.msg.ai { padding: 5px 0; }
.msg.ai .mi { display: flex; gap: 11px; align-items: flex-start; }

.ai-av {
  width: 28px; height: 28px;
  background: var(--s1);
  border-radius: 8px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--b1);
  margin-top: 3px;
  position: relative;
  overflow: hidden;
}
.ai-av::after {
  content: '';
  position: absolute; inset: 0;
  background: conic-gradient(from 0deg at 50% 50%,
    transparent, rgba(255,255,255,0.08), transparent 80%);
  animation: avSpin 6s linear infinite;
}
@keyframes avSpin { to { transform: rotate(360deg); } }
.ai-av svg { position: relative; z-index: 1; }

.ai-txt {
  flex: 1; min-width: 0;
  font-size: 0.86rem; line-height: 1.78;
  color: var(--t2); padding-top: 3px;
}
.ai-txt p { margin: 5px 0; }
.ai-txt p:first-child { margin-top: 0; }
.ai-txt h1,.ai-txt h2,.ai-txt h3 {
  color: var(--t1); font-weight: 700;
  margin: 14px 0 6px; letter-spacing: -0.02em;
}
.ai-txt h1 { font-size: 1.15rem; }
.ai-txt h2 { font-size: 1rem; }
.ai-txt h3 { font-size: 0.92rem; }
.ai-txt strong { color: var(--t1); font-weight: 600; }
.ai-txt em { color: var(--t3); }
.ai-txt code {
  font-family: var(--mono);
  background: #0d0d0d;
  border: 1px solid #222;
  padding: 2px 6px;
  border-radius: 5px;
  font-size: 0.77rem;
  color: #ccc;
}
.ai-txt pre {
  background: #070707;
  border: 1px solid #1c1c1c;
  border-radius: 12px;
  padding: 14px 16px;
  overflow-x: auto; margin: 10px 0;
  position: relative;
}
.ai-txt pre::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
}
.ai-txt pre code { background: none; border: none; color: #ccc; padding: 0; font-size: 0.78rem; }
.ai-txt blockquote {
  border-left: 2px solid #333; padding: 3px 0 3px 14px;
  color: var(--t3); margin: 8px 0; font-style: italic;
}
.ai-txt ul, .ai-txt ol { padding-left: 18px; margin: 6px 0; }
.ai-txt li { margin: 3px 0; }

.mdiv { max-width: min(760px, calc(100% - 28px)); margin: 1px auto; }
.mdiv hr { border: none; border-top: 1px solid rgba(255,255,255,0.03); }

/* typing */
.typing-row { display: flex; gap: 5px; align-items: center; padding: 8px 0; }
.td {
  width: 6px; height: 6px; border-radius: 50%; background: #444;
  animation: tdB 1.4s ease infinite;
}
.td:nth-child(2) { animation-delay: 0.15s; }
.td:nth-child(3) { animation-delay: 0.3s; }
@keyframes tdB {
  0%,60%,100% { transform: translateY(0); opacity: 0.35; background: #555; }
  30% { transform: translateY(-7px); opacity: 1; background: #fff; box-shadow: 0 0 7px #fff; }
}

/* cursor */
.cur {
  display: inline-block; width: 2px; height: 1em;
  background: #ddd; margin-left: 2px;
  vertical-align: text-bottom; border-radius: 1px;
  animation: curB 0.85s step-end infinite;
}
@keyframes curB { 0%,100%{opacity:1;} 50%{opacity:0;} }

/* ===== INPUT ===== */
.inp-area {
  flex-shrink: 0;
  padding: 8px 18px 22px;
  background: linear-gradient(to top, #000 55%, transparent);
}
@supports (padding: env(safe-area-inset-bottom)) {
  .inp-area { padding-bottom: max(18px, env(safe-area-inset-bottom)); }
}

.inp-wrap { max-width: 760px; margin: 0 auto; }

.inp-box {
  background: rgba(10,10,10,0.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 18px;
  transition: border-color 0.25s, box-shadow 0.25s;
  position: relative; overflow: hidden;
}
.inp-box::before {
  content: '';
  position: absolute; inset: 0; border-radius: 18px; pointer-events: none;
  background: linear-gradient(135deg, rgba(255,255,255,0.03), transparent);
}
.inp-box:focus-within {
  border-color: rgba(255,255,255,0.22);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.04), 0 8px 40px rgba(0,0,0,0.6);
}

.inp-row {
  display: flex; align-items: flex-end; gap: 7px;
  padding: 9px 9px 9px 16px;
}

textarea {
  flex: 1; background: transparent; border: none; outline: none;
  color: #fff; font-family: var(--font);
  font-size: 0.86rem; font-weight: 400; line-height: 1.6;
  resize: none; padding: 8px 0;
  max-height: 170px; min-height: 42px;
  scrollbar-width: none;
}
textarea::-webkit-scrollbar { display: none; }
textarea::placeholder { color: #2c2c2c; }

.sbtn, .stopbtn {
  width: 36px; height: 36px;
  border-radius: 10px; border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: all 0.2s cubic-bezier(0.22,1,0.36,1);
}
.sbtn {
  background: rgba(22,22,22,0.9);
  color: var(--t2);
  border: 1px solid rgba(255,255,255,0.12);
}
.sbtn:hover:not(:disabled) {
  background: rgba(38,38,38,0.95);
  border-color: rgba(255,255,255,0.3);
  color: #fff;
  transform: scale(1.06) translateY(-1px);
  box-shadow: 0 4px 16px rgba(255,255,255,0.08);
}
.sbtn:active:not(:disabled) { transform: scale(0.94); }
.sbtn:disabled { opacity: 0.18; cursor: not-allowed; }
.stopbtn {
  background: rgba(20,20,20,0.9);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--t3); display: none;
}
.stopbtn:hover { border-color: #fff; color: #fff; transform: scale(1.06); }

.inp-hint {
  font-size: 0.58rem; color: #2a2a2a;
  text-align: center; margin-top: 9px;
  letter-spacing: 0.05em; font-family: var(--mono);
}

/* ===== OVERLAY ===== */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(5px);
  z-index: 40; opacity: 0; visibility: hidden;
  transition: all 0.35s;
}
.overlay.show { opacity: 1; visibility: visible; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 88px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: rgba(14,14,14,0.97);
  border: 1px solid var(--b2);
  border-radius: 100px;
  padding: 8px 20px;
  font-size: 0.74rem; color: #bbb;
  opacity: 0;
  transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
  pointer-events: none; z-index: 200;
  white-space: nowrap;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.7);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== KEYFRAMES ===== */
@keyframes slideR { from{opacity:0;transform:translateX(-14px);} to{opacity:1;transform:translateX(0);} }
@keyframes slideD { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }
@keyframes fIn    { from{opacity:0;} to{opacity:1;} }
@keyframes fadeL  { from{opacity:0;transform:translateX(-8px);} to{opacity:1;transform:translateX(0);} }

/* ===== RESPONSIVE ===== */
@media (max-width: 720px) {
  :root { --sw: min(272px, 82vw); }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0;
    height: 100dvh;
    transform: translateX(calc(-1 * var(--sw)));
  }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: 4px 0 48px rgba(0,0,0,0.9);
  }
  .hud { display: none; }
  .mob-hdr { display: flex; }
  .mi { max-width: calc(100% - 20px); }
  .ubub { max-width: 88%; font-size: 0.83rem; }
  .ai-txt { font-size: 0.83rem; }
  .inp-area { padding: 6px 12px 18px; }
  .chips { grid-template-columns: 1fr 1fr; gap: 7px; }
  .chip { padding: 11px 11px; font-size: 0.7rem; }
  .welcome { padding: 20px 14px; gap: 28px; }
}
@media (max-width: 400px) {
  .chips { grid-template-columns: 1fr; }
}
@supports (padding: env(safe-area-inset-top)) {
  .mob-hdr { padding-top: max(13px, env(safe-area-inset-top)); }
}
@media (min-width: 721px) and (max-width: 1080px) {
  :root { --sw: 240px; }
  .chips { grid-template-columns: repeat(3, 1fr); }
}
@media (min-width: 1400px) {
  :root { --sw: 290px; }
}
</style>
</head>
<body>

<canvas id="c1"></canvas>
<canvas id="c2"></canvas>
<div class="vignette"></div>
<div class="hud hud-tl"></div>
<div class="hud hud-tr"></div>
<div class="hud hud-bl"></div>
<div class="hud hud-br"></div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="logo">
        <div class="logo-mark">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <span class="logo-name">Nexus AI</span>
      </div>
      <button class="ib" onclick="newChat()" title="Chat baru">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <div class="sb-body">

<script>
/* ============================================================
   CANVAS LAYER 1 — deep background: grid + nebula orbs
   ============================================================ */
(function() {
  const c = document.getElementById('c1');
  const x = c.getContext('2d');
  let W, H;

  const orbs = [
    { cx: 0.15, cy: 0.25, r: 0.38, ox: 0.0004, oy: 0.0002, phase: 0 },
    { cx: 0.80, cy: 0.70, r: 0.30, ox: -0.0003, oy: 0.0003, phase: 1.2 },
    { cx: 0.55, cy: 0.15, r: 0.22, ox: 0.0002, oy: -0.0004, phase: 2.5 },
  ];

  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  let t = 0;
  function draw() {
    x.clearRect(0, 0, W, H);
    for (const o of orbs) {
      const px = (o.cx + Math.sin(t * o.ox * 1000 + o.phase) * 0.06) * W;
      const py = (o.cy + Math.cos(t * o.oy * 1000 + o.phase) * 0.06) * H;
      const rr = o.r * Math.min(W, H);
      const g = x.createRadialGradient(px, py, 0, px, py, rr);
      g.addColorStop(0, 'rgba(255,255,255,0.022)');
      g.addColorStop(0.5, 'rgba(255,255,255,0.008)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      x.fillStyle = g;
      x.beginPath();
      x.arc(px, py, rr, 0, Math.PI * 2);
      x.fill();
    }

    const gs = 56;
    const gAlpha = 0.028 + Math.sin(t * 0.0008) * 0.008;
    x.strokeStyle = `rgba(255,255,255,${gAlpha})`;
    x.lineWidth = 0.5;
    const offX = (t * 0.012) % gs;
    const offY = (t * 0.006) % gs;
    for (let gx = -gs + offX; gx < W + gs; gx += gs) {
      x.beginPath(); x.moveTo(gx, 0); x.lineTo(gx, H); x.stroke();
    }
    for (let gy = -gs + offY; gy < H + gs; gy += gs) {
      x.beginPath(); x.moveTo(0, gy); x.lineTo(W, gy); x.stroke();
    }
    t++;
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ============================================================
   CANVAS LAYER 2 — foreground: particles + beam sweeps
   ============================================================ */
(function() {
  const c = document.getElementById('c2');
  const x = c.getContext('2d');
  let W, H;
  let pts = [];
  function initPts() {
    const n = Math.min(Math.floor((W * H) / 14000), 90);
    pts = Array.from({ length: n }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
      r: Math.random() * 1.4 + 0.4,
      a: Math.random() * 0.5 + 0.08,
      pulse: Math.random() * Math.PI * 2,
      pulseSpd: 0.02 + Math.random() * 0.02,
    }));
  }

  const beams = [
    { y: 0.22, spd: 0.00018, phase: 0,   alpha: 0.18 },
    { y: 0.61, spd: 0.00011, phase: 2.1, alpha: 0.12 },
    { y: 0.85, spd: 0.00022, phase: 4.3, alpha: 0.10 },
  ];

  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
    initPts();
  }
  resize();
  window.addEventListener('resize', resize);

  const LINK = 130;
  let t = 0;

  function draw() {
    x.clearRect(0, 0, W, H);
    for (const b of beams) {
      const prog = ((t * b.spd + b.phase) % 1);
      const bx = prog * (W + 300) - 150;
      const by = b.y * H + Math.sin(t * 0.0005 + b.phase) * H * 0.04;
      const len = W * 0.5;
      const g = x.createLinearGradient(bx - len, by, bx + len, by);
      g.addColorStop(0, 'rgba(255,255,255,0)');
      g.addColorStop(0.45, `rgba(255,255,255,${b.alpha})`);
      g.addColorStop(0.5, `rgba(255,255,255,${b.alpha * 1.6})`);
      g.addColorStop(0.55, `rgba(255,255,255,${b.alpha})`);
      g.addColorStop(1, 'rgba(255,255,255,0)');
      x.fillStyle = g;
      x.fillRect(bx - len, by - 1.5, len * 2, 3);
    }

    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i].x - pts[j].x;
        const dy = pts[i].y - pts[j].y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < LINK) {
          const a = (1 - d / LINK) * 0.09;
          x.beginPath();
          x.moveTo(pts[i].x, pts[i].y);
          x.lineTo(pts[j].x, pts[j].y);
          x.strokeStyle = `rgba(255,255,255,${a})`;
          x.lineWidth = 0.6;
          x.stroke();
        }
      }
    }

    for (const p of pts) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
      p.pulse += p.pulseSpd;
      const brightness = p.a * (0.7 + 0.3 * Math.sin(p.pulse));
      x.beginPath();
      x.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      x.fillStyle = `rgba(255,255,255,${brightness})`;
      x.fill();
    }

    if (Math.random() < 0.003) {
      const sx = Math.random() * W;
      const sy = Math.random() * H;
      const sg = x.createRadialGradient(sx, sy, 0, sx, sy, 14);
      sg.addColorStop(0, 'rgba(255,255,255,0.7)');
      sg.addColorStop(0.3, 'rgba(255,255,255,0.12)');
      sg.addColorStop(1, 'rgba(255,255,255,0)');
      x.fillStyle = sg;
      x.beginPath(); x.arc(sx, sy, 14, 0, Math.PI * 2); x.fill();
    }

    t++;
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ============================================================
   APP LOGIC — Backend di 192.168.1.6:3000
   ============================================================ */
let busy = false, abort = null, chatId = null, sessionId = null;
let msgs = [], history = [];
try { history = JSON.parse(localStorage.getItem('nx_h3') || '[]'); } catch(e) {}

// ========== BACKEND URL (GANTI DENGAN IP TERMUX ANDA) ==========
const BACKEND_URL = 'http://192.168.1.6:3000';
// =================================================================

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2600);
}

function scrollChat() {
  const c = document.getElementById('chat');
  c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function md(text) {
  if (!text) return '';
  let t = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c) => `<pre><code>${c.trim()}</code></pre>`);
  t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*\*([^*\n]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  t = t.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  t = t.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  t = t.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  t = t.split(/\n\n+/).map(p => {
    if (/^<(h[1-3]|ul|ol|pre|blockquote)/.test(p.trim())) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('');
  return t;
}

function saveH() {
  try { localStorage.setItem('nx_h3', JSON.stringify(history.slice(-60))); } catch(e) {}
  renderH();
}

function renderH() {
  const c = document.getElementById('hList');
  if (!history.length) {
    c.innerHTML = '<div style="color:#242424;padding:9px 8px;font-size:0.73rem;">Belum ada percakapan</div>';
    return;
  }
  c.innerHTML = history.slice().reverse().map((h, i) =>
    `<div class="hi ${h.id === chatId ? 'active' : ''}" style="animation-delay:${i*0.04}s"
      onclick="loadChat('${h.id}');closeSidebar();">${esc(h.title)}</div>`
  ).join('');
}

function appendMsg(role, content) {
  const chat = document.getElementById('chat');
  const w = document.createElement('div'); w.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
  const inner = document.createElement('div'); inner.className = 'mi';
  if (role === 'user') {
    const b = document.createElement('div'); b.className = 'ubub'; b.textContent = content;
    inner.appendChild(b);
  } else {
    const av = document.createElement('div'); av.className = 'ai-av';
    av.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`;
    const tx = document.createElement('div'); tx.className = 'ai-txt';
    tx.innerHTML = md(content);
    inner.appendChild(av); inner.appendChild(tx);
  }
  w.appendChild(inner); chat.appendChild(w);
  const d = document.createElement('div'); d.className = 'mdiv'; d.innerHTML = '<hr>';
  chat.appendChild(d);
  scrollChat();
}

function addTyping() {
  const chat = document.getElementById('chat');
  const d = document.createElement('div'); d.className = 'msg ai'; d.id = 'typmsg';
  d.innerHTML = `<div class="mi"><div class="ai-av"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><div class="typing-row"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  chat.appendChild(d); scrollChat();
}
function removeTyping() { const e = document.getElementById('typmsg'); if(e) e.remove(); }

async function initSession() {
  try {
    const res = await fetch(`${BACKEND_URL}/session/new`, { 
      method: 'POST', 
      headers: { 'Content-Type': 'application/json' }, 
      body: JSON.stringify({}) 
    });
    const data = await res.json();
    sessionId = data.sessionId;
    console.log('Session initialized:', sessionId);
  } catch(e) { 
    console.warn('Session init failed, using local mode'); 
    showToast('⚠️ Tidak bisa konek ke server, pastikan node server.js berjalan');
  }
}

async function sendMsg() {
  const inp = document.getElementById('input');
  const txt = inp.value.trim();
  if (!txt || busy) return;
  
  busy = true; 
  abort = new AbortController();
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('stopBtn').style.display = 'flex';

  document.getElementById('welcome').style.display = 'none';
  const chat = document.getElementById('chat');
  chat.style.display = 'flex';

  appendMsg('user', txt);
  inp.value = ''; inp.style.height = 'auto';

  if (!chatId) {
    chatId = 'c_' + Date.now();
    history.push({ id: chatId, title: txt.length > 46 ? txt.slice(0,46)+'…' : txt, messages: [] });
    saveH();
  }
  const sess = history.find(h => h.id === chatId);
  msgs.push({ role: 'user', content: txt });
  if (sess) { sess.messages = [...msgs]; saveH(); }
  addTyping();

  let full = '', streamTx = null;
  try {
    const res = await fetch(`${BACKEND_URL}/chat/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: txt, sessionId: sessionId, userId: 'nexus_user' }),
      signal: abort.signal
    });
    
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    removeTyping();

    const w = document.createElement('div'); w.className = 'msg ai';
    const inner = document.createElement('div'); inner.className = 'mi';
    const av = document.createElement('div'); av.className = 'ai-av';
    av.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`;
    streamTx = document.createElement('div'); streamTx.className = 'ai-txt';
    inner.appendChild(av); inner.appendChild(streamTx);
    w.appendChild(inner); chat.appendChild(w);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = dec.decode(value, { stream: true });
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const j = JSON.parse(line.slice(6));
            if (j.token) { 
              full += j.token; 
              streamTx.innerHTML = md(full) + '<span class="cur"></span>'; 
              scrollChat(); 
            }
            if (j.done) break;
          } catch(e) {}
        }
      }
    }
    if (streamTx) streamTx.innerHTML = md(full);
    const dv = document.createElement('div'); dv.className = 'mdiv'; dv.innerHTML = '<hr>';
    chat.appendChild(dv); scrollChat();
  } catch(err) {
    removeTyping();
    if (err.name === 'AbortError') {
      showToast('⏹️ Generasi dihentikan');
    } else {
      showToast(`❌ Gagal konek ke ${BACKEND_URL}\nPastikan server jalan dan 1 WiFi`);
      console.error(err);
    }
    if (streamTx && streamTx.parentElement) streamTx.parentElement.parentElement?.remove();
  }

  if (full) {
    msgs.push({ role: 'assistant', content: full });
    const s = history.find(h => h.id === chatId);
    if (s) { s.messages = [...msgs]; saveH(); }
  }
  busy = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('stopBtn').style.display = 'none';
  abort = null;
  inp.focus();
}

function stopGen() {
  if (abort) {
    abort.abort(); 
    busy = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('stopBtn').style.display = 'none';
    removeTyping(); 
    showToast('⏹️ Generasi dihentikan');
  }
}

function loadChat(id) {
  const f = history.find(h => h.id === id);
  if (!f) return;
  chatId = id; msgs = [...f.messages];
  const chat = document.getElementById('chat'); chat.innerHTML = '';
  document.getElementById('welcome').style.display = 'none';
  chat.style.display = 'flex';
  for (const m of msgs) appendMsg(m.role, m.content);
  renderH();
}

function newChat() {
  if (busy) stopGen();
  chatId = null; msgs = [];
  const chat = document.getElementById('chat'); chat.innerHTML = '';
  chat.style.display = 'none';
  const w = document.getElementById('welcome');
  w.style.display = 'flex';
  w.style.animation = 'none';
  requestAnimationFrame(() => { w.style.animation = ''; });
  renderH(); closeSidebar();
  setTimeout(() => document.getElementById('input').focus(), 80);
}

function suggest(q) {
  document.getElementById('input').value = q;
  sendMsg();
}

// textarea auto-resize
const ta = document.getElementById('input');
ta.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 170) + 'px';
});
ta.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// Start
initSession();
renderH();
setTimeout(() => ta.focus(), 250);
</script>
